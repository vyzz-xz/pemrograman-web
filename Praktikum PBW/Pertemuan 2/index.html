<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pertemuan 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="title">Pendaftaran Mahasiswa Baru</h1>
    <div class="container">
        <form action="" method="get">
        <div class="form-group">
            <label>NPM (Nomor Pokok Mahasiswa)</label>
            <input type="text" placeholder="Masukkan NPM">
        </div>

        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" placeholder="Masukkan nama lengkap">
        </div>

        <div class="form-textarea">
            <label>Alamat</label>
            <textarea placeholder="Masukkan alamat lengkap"></textarea>
        </div>

        <div class="form-group">
            <label>Jenis Kelamin</label>
            <div class="radio-group">
                <input type="radio" name="jk"> Pria
                <input type="radio" name="jk"> Wanita
            </div>
        </div>

        <div class="form-group-select">
            <label>Program Studi</label>
            <select>
                <option value="ti">Teknik Informatika</option>
                <option value="si">Sistem Informasi</option>
            </select>
        </div>

        <button class="btn-submit">Daftar</button>
        </form>
    </div>
</body>
</html>
